name: Build and Push Docker Image (Adishree_Project)

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ENVIRONMENT: ""
      IMAGE_REPO_NAME: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Generate a safe image repository name from your GitHub repo name
      # Example: "Adishree_Project" -> "adishree-project"
      - name: Get image repo name (lowercase, safe)
        shell: bash
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          SAFE_NAME="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | tr '_' '-')"
          echo "IMAGE_REPO_NAME=$SAFE_NAME" >> $GITHUB_ENV

      - name: If DEV (PR), set dev variables
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          echo "ENVIRONMENT=dev" >> $GITHUB_ENV

      - name: If QA (push to main), set qa variables
        if: github.event_name == 'push' && github.ref_type != 'tag'
        shell: bash
        run: |
          echo "ENVIRONMENT=qa" >> $GITHUB_ENV

      - name: If PROD (tag), set prod variables
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          echo "ENVIRONMENT=prod" >> $GITHUB_ENV

      - name: Generate Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true
        with:
          images: |
            ${{ secrets.LIGHT_DOCKER_REPOSITORY_URL }}/${{ env.IMAGE_REPO_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=sha,prefix=sha-,format=short
            type=sha,prefix=${{ env.ENVIRONMENT }}-sha-,format=short
            type=ref,event=pr
            type=ref,event=branch
            type=ref,event=tag

      - name: Login to LIGHT registry/ECR
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.LIGHT_DOCKER_USER }}
          password: ${{ secrets.LIGHT_DOCKER_TOKEN }}
          registry: ${{ secrets.LIGHT_DOCKER_REPOSITORY_URL }}
          ecr: false

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
