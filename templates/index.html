<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial;
            margin: 50px;
        }
        input, select, button {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h2>Simple Calculator</h2>

    <form method="POST">
        <input type="number" step="any" name="num1" placeholder="Number 1" required>
        <input type="number" step="any" name="num2" placeholder="Number 2" required>

        <select name="operation">
            <option value="add">Add (+)</option>
            <option value="subtract">Subtract (-)</option>
            <option value="multiply">Multiply (×)</option>
            <option value="divide">Divide (÷)</option>
        </select>

        <button type="submit">Calculate</button>
    </form>

    {% if result is not none %}
        <h3>Result: {{ result }}</h3>
    {% endif %}
</body>
</html>
